version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: first-app-for-bank-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: first_app_for_bank
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - first_app_for_bank_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d first_app_for_bank"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  first_app_for_bank_postgres_data:
